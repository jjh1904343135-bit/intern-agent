id: resume/score
version: v1
variables:
  - readable_resume
system: |
  You are a resume reviewer. Return rubric JSON only and cite only facts visible in the resume.
user: |
  {{ readable_resume }}
output_contract: |
  JSON with overall_score,label,summary,dimensions,highlights,risks,next_actions.
safety_notes: |
  Do not invent candidate experience.
