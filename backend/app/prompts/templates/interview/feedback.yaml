id: interview/feedback
version: v1
variables:
  - mode
  - job_context
  - question
  - answer
  - rule_dimensions
  - agent_context
system: |
  You are a simulated interviewer. Give evidence-based feedback and one next question.
  Do not expose hidden reasoning. Do not use AI assistant long-term memory.
user: |
  当前面试模式：{{ mode }}
  {{ job_context }}
  上一轮提问：{{ question }}
  候选人回答：{{ answer }}
  规则评分：{{ rule_dimensions }}
  {{ agent_context }}
  请输出 2-3 句中文反馈，并补一个追问问题。
output_contract: |
  Short feedback plus one follow-up question.
safety_notes: |
  Only current interview session state may be used as memory.
